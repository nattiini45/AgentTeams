apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentteams.secretName" . }}
  namespace: {{ include "agentteams.namespace" . }}
  labels:
    {{- include "agentteams.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $existingSecret := (lookup "v1" "Secret" (include "agentteams.namespace" .) (include "agentteams.secretName" .)) }}
  {{- if .Values.credentials.registrationToken }}
  AGENTTEAMS_REGISTRATION_TOKEN: {{ .Values.credentials.registrationToken | quote }}
  AGENTTEAMS_MATRIX_REGISTRATION_TOKEN: {{ .Values.credentials.registrationToken | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "AGENTTEAMS_REGISTRATION_TOKEN") }}
  AGENTTEAMS_REGISTRATION_TOKEN: {{ index $existingSecret.data "AGENTTEAMS_REGISTRATION_TOKEN" | b64dec | quote }}
  AGENTTEAMS_MATRIX_REGISTRATION_TOKEN: {{ index $existingSecret.data "AGENTTEAMS_REGISTRATION_TOKEN" | b64dec | quote }}
  {{- else }}
  {{- $token := randAlphaNum 32 }}
  AGENTTEAMS_REGISTRATION_TOKEN: {{ $token | quote }}
  AGENTTEAMS_MATRIX_REGISTRATION_TOKEN: {{ $token | quote }}
  {{- end }}
  AGENTTEAMS_ADMIN_USER: {{ .Values.credentials.adminUser | quote }}
  {{- if .Values.credentials.adminPassword }}
  AGENTTEAMS_ADMIN_PASSWORD: {{ .Values.credentials.adminPassword | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "AGENTTEAMS_ADMIN_PASSWORD") }}
  AGENTTEAMS_ADMIN_PASSWORD: {{ index $existingSecret.data "AGENTTEAMS_ADMIN_PASSWORD" | b64dec | quote }}
  {{- else }}
  AGENTTEAMS_ADMIN_PASSWORD: {{ randAlphaNum 16 | quote }}
  {{- end }}
  AGENTTEAMS_LLM_API_KEY: {{ required "credentials.llmApiKey is required" .Values.credentials.llmApiKey | quote }}
  AGENTTEAMS_LLM_PROVIDER: {{ .Values.credentials.llmProvider | quote }}
  AGENTTEAMS_DEFAULT_MODEL: {{ .Values.credentials.defaultModel | quote }}
  {{- if .Values.credentials.llmBaseUrl }}
  AGENTTEAMS_OPENAI_BASE_URL: {{ .Values.credentials.llmBaseUrl | quote }}
  {{- end }}
  {{- /* Matrix AppService tokens: controller panics without as/hs_token. Resolution order: values override -> existing Secret -> generated. See values.yaml matrix.appservice. */}}
  AGENTTEAMS_MATRIX_APPSERVICE_ENABLED: {{ .Values.matrix.appservice.enabled | toString | quote }}
  {{- if .Values.matrix.appservice.asToken }}
  AGENTTEAMS_MATRIX_APPSERVICE_AS_TOKEN: {{ .Values.matrix.appservice.asToken | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "AGENTTEAMS_MATRIX_APPSERVICE_AS_TOKEN") }}
  AGENTTEAMS_MATRIX_APPSERVICE_AS_TOKEN: {{ index $existingSecret.data "AGENTTEAMS_MATRIX_APPSERVICE_AS_TOKEN" | b64dec | quote }}
  {{- else }}
  AGENTTEAMS_MATRIX_APPSERVICE_AS_TOKEN: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if .Values.matrix.appservice.hsToken }}
  AGENTTEAMS_MATRIX_APPSERVICE_HS_TOKEN: {{ .Values.matrix.appservice.hsToken | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "AGENTTEAMS_MATRIX_APPSERVICE_HS_TOKEN") }}
  AGENTTEAMS_MATRIX_APPSERVICE_HS_TOKEN: {{ index $existingSecret.data "AGENTTEAMS_MATRIX_APPSERVICE_HS_TOKEN" | b64dec | quote }}
  {{- else }}
  AGENTTEAMS_MATRIX_APPSERVICE_HS_TOKEN: {{ randAlphaNum 64 | quote }}
  {{- end }}
