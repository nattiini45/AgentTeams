{{- if .Values.elementWeb.enabled }}
{{- $comp := dict "root" . "component" "element-web" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentteams.elementWeb.fullname" . }}
  namespace: {{ include "agentteams.namespace" . }}
  labels:
    {{- include "agentteams.component.labels" $comp | nindent 4 }}
spec:
  replicas: {{ .Values.elementWeb.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentteams.component.selectorLabels" $comp | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentteams.component.selectorLabels" $comp | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: element-config
          configMap:
            name: {{ include "agentteams.elementWeb.fullname" . }}-config
      containers:
        - name: element-web
          image: "{{ .Values.elementWeb.image.repository }}:{{ .Values.elementWeb.image.tag }}"
          imagePullPolicy: {{ .Values.elementWeb.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ELEMENT_WEB_PORT
              value: "8080"
          volumeMounts:
            - name: element-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
              readOnly: true
          resources:
            {{- toYaml .Values.elementWeb.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
{{- end }}
