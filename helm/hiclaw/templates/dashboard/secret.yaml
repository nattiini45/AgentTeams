{{- if and .Values.dashboard.enabled (not .Values.dashboard.existingSecret) }}
{{- $name := printf "%s-auth" (include "hiclaw.dashboard.fullname" .) }}
{{- $existing := lookup "v1" "Secret" (include "hiclaw.namespace" .) $name }}
{{- $password := .Values.dashboard.password }}
{{- if not $password }}
  {{- if and $existing $existing.data (index $existing.data "password") }}
    {{- $password = (index $existing.data "password" | b64dec) }}
  {{- else }}
    {{- $password = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" (dict "root" . "component" "dashboard") | nindent 4 }}
type: Opaque
stringData:
  password: {{ $password | quote }}
{{- end }}
