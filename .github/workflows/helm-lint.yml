name: Helm Lint

on:
  pull_request:
    paths:
      - 'helm/**'
      - 'openhuman/scripts/openhuman-worker-entrypoint.sh'
      - 'tests/check-agentteams-rename-defaults.sh'
      - 'tests/check-helm-agentteams.sh'
  workflow_dispatch: ~

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AgentTeams rename contracts
        run: bash tests/check-agentteams-rename-defaults.sh

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add dependency repos
        run: helm repo add higress.io https://higress.io/helm-charts

      - name: Build dependencies
        run: helm dependency build helm/agentteams/

      - name: Lint
        run: helm lint helm/agentteams/

      - name: Template dry-run
        run: |
          bash tests/check-helm-agentteams.sh
