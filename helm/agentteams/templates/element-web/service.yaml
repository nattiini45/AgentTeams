{{- if .Values.elementWeb.enabled }}
{{- $comp := dict "root" . "component" "element-web" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentteams.elementWeb.fullname" . }}
  namespace: {{ include "agentteams.namespace" . }}
  labels:
    {{- include "agentteams.component.labels" $comp | nindent 4 }}
spec:
  type: {{ .Values.elementWeb.service.type }}
  selector:
    {{- include "agentteams.component.selectorLabels" $comp | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.elementWeb.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.elementWeb.service.type "NodePort") .Values.elementWeb.service.nodePort }}
      nodePort: {{ .Values.elementWeb.service.nodePort }}
      {{- end }}
{{- end }}
