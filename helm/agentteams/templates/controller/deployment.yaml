{{- $comp := dict "root" . "component" "controller" }}
{{- $tag := include "agentteams.imageTag" (dict "tag" .Values.controller.image.tag "global" .Values.global "root" $) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentteams.controller.fullname" . }}
  namespace: {{ include "agentteams.namespace" . }}
  labels:
    {{- include "agentteams.component.labels" $comp | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "agentteams.component.selectorLabels" $comp | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentteams.component.selectorLabels" $comp | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agentteams.controller.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ $tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.targetPort }}
              protocol: TCP
            {{- if .Values.controller.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.controller.metrics.targetPort }}
              protocol: TCP
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "agentteams.secretName" . }}
          env:
            - name: AGENTTEAMS_KUBE_MODE
              value: "incluster"
            - name: AGENTTEAMS_HTTP_ADDR
              value: {{ printf ":%v" .Values.controller.service.targetPort | quote }}
            - name: AGENTTEAMS_METRICS_BIND_ADDR
              value: {{ ternary .Values.controller.metrics.bindAddress "0" .Values.controller.metrics.enabled | quote }}
            - name: AGENTTEAMS_CONTROLLER_URL
              value: {{ include "agentteams.controller.internalURL" . | quote }}
            {{- /*
              Controller instance name. Also doubles as the ConfigMap name the
              controller reads at Create() time for the agent PodTemplateSpec
              overlay (same namespace, key: pod-template.yaml). Users wanting
              to inject sysctls / nodeSelector / tolerations / imagePullSecrets
              etc. into every Manager/Worker Pod must create a ConfigMap with
              this exact name. Absent ConfigMap = no overlay (default shape).
              See docs/agent-pod-template.md.
            */}}
            - name: AGENTTEAMS_CONTROLLER_NAME
              value: {{ include "agentteams.controller.fullname" . | quote }}
            {{- /*
              Tenant-level resource-name prefix. Drives Pod / ServiceAccount
              / "app" label / STS session-name derivation for all resources
              this controller creates. Set controller.resourcePrefix (e.g.
              "teamA-") to isolate multiple AgentTeams instances sharing one
              namespace. See internal/auth.ResourcePrefix for the full
              derivation table.
            */}}
            - name: AGENTTEAMS_RESOURCE_PREFIX
              value: {{ .Values.controller.resourcePrefix | default "agentteams-" | quote }}
            - name: AGENTTEAMS_RESOURCE_AUTOPREFIX
              value: {{ .Values.controller.resourceAutoPrefix | default true | quote }}
            - name: AGENTTEAMS_WORKER_BACKEND
              value: {{ .Values.controller.workerBackend | quote }}
            - name: AGENTTEAMS_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGENTTEAMS_WORKER_IMAGE
              value: {{ include "agentteams.worker.openclawImage" . | quote }}
            - name: AGENTTEAMS_COPAW_WORKER_IMAGE
              value: {{ include "agentteams.worker.copawImage" . | quote }}
            - name: AGENTTEAMS_HERMES_WORKER_IMAGE
              value: {{ include "agentteams.worker.hermesImage" . | quote }}
            - name: AGENTTEAMS_OPENHUMAN_WORKER_IMAGE
              value: {{ include "agentteams.worker.openhumanImage" . | quote }}
            - name: AGENTTEAMS_DEFAULT_WORKER_RUNTIME
              value: {{ .Values.worker.defaultRuntime | quote }}
            - name: TZ
              value: {{ .Values.controller.timezone | quote }}
            - name: AGENTTEAMS_STORAGE_PROVIDER
              value: {{ .Values.storage.provider | quote }}
            - name: AGENTTEAMS_FS_ENDPOINT
              value: {{ include "agentteams.storage.endpoint" . | quote }}
            - name: AGENTTEAMS_FS_BUCKET
              value: {{ include "agentteams.storage.bucket" . | quote }}
            {{- if eq .Values.storage.provider "minio" }}
            - name: AGENTTEAMS_FS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentteams.storage.adminSecretName" . }}
                  key: {{ include "agentteams.storage.adminAccessKeyKey" . }}
            - name: AGENTTEAMS_FS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentteams.storage.adminSecretName" . }}
                  key: {{ include "agentteams.storage.adminSecretKeyKey" . }}
            {{- end }}
            - name: AGENTTEAMS_GATEWAY_PROVIDER
              value: {{ .Values.gateway.provider | quote }}
            {{- if eq .Values.gateway.provider "higress" }}
            - name: AGENTTEAMS_AI_GATEWAY_ADMIN_URL
              value: {{ include "agentteams.gateway.adminURL" . | quote }}
            - name: AGENTTEAMS_AI_GATEWAY_URL
              value: {{ include "agentteams.gateway.internalURL" . | quote }}
            {{- else if eq .Values.gateway.provider "ai-gateway" }}
            - name: AGENTTEAMS_AI_GATEWAY_URL
              value: {{ include "agentteams.gateway.internalURL" . | quote }}
            - name: AGENTTEAMS_REGION
              value: {{ .Values.gateway.aiGateway.region | quote }}
            {{- if .Values.gateway.aiGateway.endpoint }}
            - name: AGENTTEAMS_APIG_ENDPOINT
              value: {{ .Values.gateway.aiGateway.endpoint | quote }}
            {{- end }}
            - name: AGENTTEAMS_GW_GATEWAY_ID
              value: {{ .Values.gateway.aiGateway.gatewayId | quote }}
            - name: AGENTTEAMS_GW_MODEL_API_ID
              value: {{ .Values.gateway.aiGateway.modelApiId | quote }}
            - name: AGENTTEAMS_GW_ENV_ID
              value: {{ .Values.gateway.aiGateway.envId | quote }}
            {{- end }}
            {{- if .Values.credentialProvider.enabled }}
            - name: AGENTTEAMS_CREDENTIAL_PROVIDER_URL
              value: {{ printf "http://127.0.0.1:%d" (.Values.credentialProvider.port | int) | quote }}
            {{- end }}
            {{- /* Matrix connection (Go MatrixClient) */}}
            - name: AGENTTEAMS_MATRIX_URL
              value: {{ include "agentteams.matrix.internalURL" . | quote }}
            - name: AGENTTEAMS_MATRIX_DOMAIN
              value: {{ include "agentteams.matrix.serverName" . | quote }}
            {{- /* OSS storage prefix */}}
            - name: AGENTTEAMS_STORAGE_PREFIX
              value: {{ include "agentteams.storage.remoteRoot" . | quote }}
            {{- /* K8s mode runtime */}}
            - name: AGENTTEAMS_RUNTIME
              value: "k8s"
            {{- /* K8s worker resource defaults */}}
            - name: AGENTTEAMS_K8S_WORKER_CPU
              value: {{ .Values.worker.resources.limits.cpu | default "1000m" | quote }}
            - name: AGENTTEAMS_K8S_WORKER_MEMORY
              value: {{ .Values.worker.resources.limits.memory | default "2Gi" | quote }}
            {{- /* Manager CRD-driven deployment */}}
            - name: AGENTTEAMS_MANAGER_ENABLED
              value: {{ .Values.manager.enabled | quote }}
            - name: AGENTTEAMS_MANAGER_SPEC
              value: {{ include "agentteams.manager.spec" . | quote }}
            {{- /* Element Web URL (for Gateway route initialization) */}}
            {{- if .Values.elementWeb.enabled }}
            - name: AGENTTEAMS_ELEMENT_WEB_URL
              value: {{ printf "http://%s-element-web.%s.svc.cluster.local:%d" (include "agentteams.fullname" .) (include "agentteams.namespace" .) (.Values.elementWeb.service.port | int) | quote }}
            {{- end }}
            {{- /* Credential persistence */}}
            - name: AGENTTEAMS_CREDS_DIR
              value: "/data/worker-creds"
            {{- /* CMS observability (propagated to manager + workers by controller) */}}
            {{- if .Values.cms.enabled }}
            - name: AGENTTEAMS_CMS_TRACES_ENABLED
              value: "true"
            - name: AGENTTEAMS_CMS_ENDPOINT
              value: {{ .Values.cms.endpoint | quote }}
            - name: AGENTTEAMS_CMS_LICENSE_KEY
              value: {{ .Values.cms.licenseKey | quote }}
            - name: AGENTTEAMS_CMS_PROJECT
              value: {{ .Values.cms.project | quote }}
            - name: AGENTTEAMS_CMS_WORKSPACE
              value: {{ .Values.cms.workspace | quote }}
            - name: AGENTTEAMS_CMS_SERVICE_NAME
              value: {{ .Values.cms.serviceName | default "agentteams-manager" | quote }}
            {{- if .Values.cms.metricsEnabled }}
            - name: AGENTTEAMS_CMS_METRICS_ENABLED
              value: "true"
            {{- end }}
            {{- end }}
            {{- range $k, $v := .Values.controller.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          volumeMounts:
            - name: worker-creds
              mountPath: /data/worker-creds
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
        {{- if .Values.credentialProvider.enabled }}
        {{- $cpTag := include "agentteams.imageTag" (dict "tag" .Values.credentialProvider.image.tag "global" .Values.global "root" $) }}
        - name: credential-provider
          image: "{{ required "credentialProvider.image.repository is required" .Values.credentialProvider.image.repository }}:{{ $cpTag }}"
          imagePullPolicy: {{ .Values.credentialProvider.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: creds
              containerPort: {{ .Values.credentialProvider.port | int }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.credentialProvider.port | quote }}
            {{- range $k, $v := .Values.credentialProvider.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.credentialProvider.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.credentialProvider.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: creds
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: creds
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
        {{- end }}
      volumes:
        - name: worker-creds
          emptyDir: {}
