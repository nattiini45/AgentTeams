{{- if and .Values.dashboard.enabled .Values.dashboard.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentteams.dashboard.serviceAccountName" . }}
  namespace: {{ include "agentteams.namespace" . }}
  labels:
    {{- include "agentteams.component.labels" (dict "root" . "component" "dashboard") | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
