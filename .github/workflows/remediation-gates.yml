name: Remediation gates

on:
  pull_request:
    paths:
      - "agentteams-controller/**"
      - "copaw/**"
      - "hermes/**"
      - "qwenpaw/**"
      - "openhuman/**"
      - "dashboard/**"
      - "helm/**"
      - "install/**"
      - "shared/**"
      - ".github/workflows/remediation-gates.yml"
  workflow_dispatch:

concurrency:
  group: remediation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controller:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: agentteams-controller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agentteams-controller/go.mod
          cache-dependency-path: agentteams-controller/go.sum
      - run: go test -timeout=5m ./internal/... ./cmd/...

  python-runtimes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        runtime: [copaw, hermes, qwenpaw, openhuman]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install local shared Python packages
        run: |
          set -euo pipefail
          for pkg in shared/python/agentteams_*; do
            [ -f "${pkg}/pyproject.toml" ] || continue
            python -m pip install -e "./${pkg}"
          done
      - run: python -m pip install -e "./${{ matrix.runtime }}[test]"
      - run: python -m pytest -q "${{ matrix.runtime }}/tests"

  shared-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install shared Python packages
        run: |
          set -euo pipefail
          for pkg in shared/python/agentteams_*; do
            [ -f "${pkg}/pyproject.toml" ] || continue
            python -m pip install -e "./${pkg}[test]" 2>/dev/null || python -m pip install -e "./${pkg}"
          done
      - name: Run shared Python tests
        run: |
          set -euo pipefail
          for pkg in shared/python/agentteams_*; do
            [ -d "${pkg}/tests" ] || continue
            echo "=== ${pkg} ==="
            python -m pytest -q "${pkg}/tests"
          done

  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [server, web]
    defaults:
      run:
        working-directory: dashboard/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/web/package-lock.json
      - if: matrix.package == 'web'
        run: npm ci
      - run: npm test
      - if: matrix.package == 'web'
        run: npm run build

  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Add dependency repos
        run: helm repo add higress.io https://higress.io/helm-charts
      - run: helm dependency build helm/agentteams
      - run: helm lint helm/agentteams --set credentials.llmApiKey=dummy --set gateway.publicURL=http://localhost:18080
      - run: >
          helm template test helm/agentteams
          --set credentials.llmApiKey=dummy
          --set gateway.publicURL=http://localhost:18080
          --set dashboard.enabled=true > /dev/null

  shared-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run shared shell unit tests
        run: |
          set -euo pipefail
          for t in shared/tests/test-*.sh; do
            echo "=== ${t} ==="
            bash "${t}"
          done
