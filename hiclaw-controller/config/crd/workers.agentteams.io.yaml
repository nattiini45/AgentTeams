apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workers.agentteams.io
spec:
  group: agentteams.io
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model]
              properties:
                model:
                  type: string
                  description: LLM model ID (e.g. claude-sonnet-4-6, qwen3.6-plus)
                modelProvider:
                  type: string
                  description: Name of the AI gateway Model API to use as the LLM provider.
                runtime:
                  type: string
                  enum: [openclaw, copaw, hermes, openhuman, qwenpaw]
                  description: |
                    Agent runtime. When omitted the controller falls back to
                    AGENTTEAMS_DEFAULT_WORKER_RUNTIME (set at install time), and
                    finally to "openclaw" if neither is set.
                image:
                  type: string
                  description: Custom Docker image for this worker
                workerName:
                  type: string
                  description: Business/runtime identity for Matrix localpart and OSS path key (fallback to metadata.name)
                identity:
                  type: string
                  description: Worker public identity (generates IDENTITY.md; merged into SOUL.md for copaw and hermes)
                soul:
                  type: string
                  description: Worker identity and role definition (generates SOUL.md)
                agents:
                  type: string
                  description: Agent behavior rules (generates AGENTS.md)
                skills:
                  type: array
                  items:
                    type: string
                    not:
                      pattern: '^nacos://'
                  description: AgentTeams built-in skills to enable (remote registry skills must use remoteSkills)
                remoteSkills:
                  type: array
                  description: Remote skills fetched from source registries.
                  items:
                    type: object
                    required: [source, skills]
                    properties:
                      source:
                        type: string
                        pattern: '^nacos://[^/]+/[^/?#]+$'
                        description: Remote source in nacos://host[:port]/namespace-id format.
                      authType:
                        type: string
                        enum: [sts-hiclaw, nacos, none]
                        description: "Authentication mode for remote source access. Empty auto-detects: embedded username/password selects nacos; otherwise none. nacos: username/password embedded in source URL; sts-hiclaw: STS credential provider; none: unauthenticated."
                      skills:
                        type: array
                        minItems: 1
                        description: Skills to fetch from the remote source.
                        items:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                            version:
                              type: string
                            label:
                              type: string
                mcpServers:
                  type: array
                  description: MCP servers callable via mcporter. url is the full endpoint; transport defaults to http.
                  items:
                    type: object
                    required: [name, url]
                    properties:
                      name:
                        type: string
                        description: Key in mcporter-servers.json; used by tool calls as <name>.<tool>.
                      url:
                        type: string
                        description: Full MCP endpoint URL (gateway-side path included).
                      transport:
                        type: string
                        enum: [http, sse]
                        default: http
                        description: Transport protocol (http=Streamable HTTP, sse=Server-Sent Events).
                package:
                  type: string
                  description: "Package URI: file://, http(s)://, nacos://, or packages/{name}.zip"
                expose:
                  type: array
                  description: Ports to expose via Higress gateway. Each port gets an auto-generated domain.
                  items:
                    type: object
                    required: [port]
                    properties:
                      port:
                        type: integer
                        description: Container port to expose
                      protocol:
                        type: string
                        enum: [http, grpc]
                        default: http
                        description: Protocol (default http)
                channelPolicy:
                  type: object
                  description: "Additive/subtractive overrides for communication policies (on top of defaults)"
                  properties:
                    groupAllowExtra:
                      type: array
                      items:
                        type: string
                      description: "Additional Matrix user IDs to allow in group @mentions"
                    groupDenyExtra:
                      type: array
                      items:
                        type: string
                      description: "Matrix user IDs to deny from group @mentions (overrides allow)"
                    dmAllowExtra:
                      type: array
                      items:
                        type: string
                      description: "Additional Matrix user IDs to allow in DMs"
                    dmDenyExtra:
                      type: array
                      items:
                        type: string
                      description: "Matrix user IDs to deny from DMs (overrides allow)"
                channels:
                  type: object
                  description: "External access-channel desired state for this worker."
                  properties:
                    dingtalk:
                      type: object
                      description: "DingTalk external IM channel configuration."
                      required: [enabled]
                      properties:
                        enabled:
                          type: boolean
                          description: "Whether DingTalk channel is enabled."
                        clientId:
                          type: string
                          description: "DingTalk application client ID."
                        clientSecret:
                          type: string
                          description: "Sensitive DingTalk application client secret."
                        robotCode:
                          type: string
                          description: "DingTalk robot code; backend defaults empty value to clientId."
                        showThinking:
                          type: boolean
                          description: "Whether DingTalk replies may include thinking content."
                        showToolCalls:
                          type: boolean
                          description: "Whether DingTalk replies may include tool-call content."
                        streamingEnabled:
                          type: boolean
                          description: "Whether DingTalk replies use streaming output."
                        messageType:
                          type: string
                          enum: [markdown, card]
                          description: "DingTalk reply message type. Empty defaults to markdown."
                        cardTemplateId:
                          type: string
                          description: "DingTalk card template ID, required for card message type."
                containerManaged:
                  type: boolean
                  description: >
                    When false, the controller skips container lifecycle management
                    for this worker. Use for remote workers whose process is managed
                    externally (e.g., via systemd). Default is true (controller
                    creates and manages containers).
                resources:
                  type: object
                  description: >
                    CPU and memory requests/limits for the Worker Pod.
                    Empty fields fall back to controller/backend defaults.
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: Kubernetes CPU quantity, e.g. 300m
                        memory:
                          type: string
                          description: Kubernetes memory quantity, e.g. 768Mi
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: Kubernetes CPU quantity, e.g. "2"
                        memory:
                          type: string
                          description: Kubernetes memory quantity, e.g. 3Gi
                idleTimeout:
                  type: string
                  description: "Idle duration after lastActiveAt before the controller sets state to Sleeping, e.g. 15m."
                state:
                  type: string
                  enum: [Running, Sleeping, Stopped]
                  description: "Desired lifecycle state (default: Running). The controller reconciles actual state toward this."
                deployMode:
                  type: string
                  enum: ["Local", "Edge"]
                  description: "Where the worker runs. Local (default): controller's own cluster; Edge: externally hosted on a remote host outside the controller's cluster."
                serviceEnabled:
                  type: boolean
                  description: "Whether to create a ClusterIP Service alongside the worker pod."
                backendRuntime:
                  type: string
                  enum: ["pod"]
                  description: |
                    Container runtime backend for this worker.
                    "pod" (default): standard Kubernetes Pod.
                    Only effective in incluster mode; ignored in embedded (Docker) mode.
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: >
                    User-defined Pod labels stamped onto this worker's Pod.
                    Merged on top of the ConfigMap-based pod-template overlay
                    and CR metadata.labels, and below controller-forced
                    system labels (agentteams.io/controller, agentteams.io/worker,
                    agentteams.io/role, agentteams.io/runtime, app). Entries whose
                    keys collide with those system labels are silently
                    overridden.
                env:
                  type: object
                  description: |
                    User-defined environment variables injected into the worker container.
                    Keys that collide with variables already set by the controller or backend
                    (AGENTTEAMS_*, OPENCLAW_*, HOME, and similar internal keys) are silently
                    ignored with a warning log — the system value always wins.
                  additionalProperties:
                    type: string
                agentIdentity:
                  type: object
                  description: Non-secret workload identity metadata used by managed runtimes to resolve credential bindings.
                  properties:
                    workloadIdentityName:
                      type: string
                credentialBindings:
                  type: array
                  description: Non-secret runtime credential references resolved by the worker through AgentIdentityData.
                  items:
                    type: object
                    properties:
                      credentialRef:
                        type: object
                        properties:
                          tokenVaultName:
                            type: string
                          apiKeyCredentialProviderName:
                            type: string
                      toolWhitelist:
                        type: array
                        items:
                          type: string
                accessEntries:
                  type: array
                  description: >
                    Cloud credential scope declarations. Only honored when the controller
                    runs with a credential-provider sidecar (gateway.provider=ai-gateway
                    or storage.provider=oss). Ignored in local higress+minio deployments.
                    When empty the controller applies sensible defaults equivalent to the
                    legacy worker role (agents/<name>/* + shared/* on the configured bucket).
                  items:
                    type: object
                    required: [service]
                    properties:
                      service:
                        type: string
                        enum: [object-storage, ai-gateway, ai-registry, schedulerx3]
                        description: Logical cloud service identifier
                      permissions:
                        type: array
                        items:
                          type: string
                          enum: [read, write, list, delete]
                      scope:
                        type: object
                        description: >
                          Schema-less scope blob. For object-storage use keys
                          bucketRef|bucket and prefixes (list of strings). For
                          ai-gateway use keys gatewayRef|gatewayId and resources
                          (list of strings). Template vars ${self.name} /
                          ${self.kind} / ${self.namespace} are expanded by the
                          controller before the request reaches the provider.
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                specHash:
                  type: string
                phase:
                  type: string
                  enum: [Pending, Starting, Running, Updating, Stopping, Sleeping, Stopped, Failed]
                matrixUserID:
                  type: string
                roomID:
                  type: string
                containerState:
                  type: string
                deployMode:
                  type: string
                lastHeartbeat:
                  type: string
                  format: date-time
                lastActiveAt:
                  type: string
                  format: date-time
                llmCallsLastHeartbeat:
                  type: integer
                  format: int64
                  description: LLM HTTP calls reported in the last worker heartbeat window
                llmCallsTotal:
                  type: integer
                  format: int64
                  description: Cumulative LLM HTTP calls reported by the worker since creation
                message:
                  type: string
                exposedPorts:
                  type: array
                  description: Ports currently exposed via Higress gateway
                  items:
                    type: object
                    properties:
                      port:
                        type: integer
                      domain:
                        type: string
                backendRuntime:
                  type: string
                  description: |
                    The backend type currently deployed for this worker.
                    Set by the controller after successful creation or backend switch.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Model
          type: string
          jsonPath: .spec.model
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: workers
    singular: worker
    kind: Worker
    shortNames: [wk]
