name: Build Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. v1.1.0). Leave empty for tag-triggered runs.'
        required: false
        type: string
      targets:
        description: 'Space-separated list of push targets (default: all). Options: openclaw-base agentteams-controller embedded manager manager-copaw worker copaw-worker hermes-worker qwenpaw-worker'
        required: false
        type: string
        default: 'all'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  REGISTRY: higress-registry.cn-hangzhou.cr.aliyuncs.com
  REPO: agentteams

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Free Up GitHub Actions Ubuntu Runner Disk Space 🔧
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables cross-platform emulation (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            # Keep QwenPaw available for explicit workflow_dispatch builds, but
            # defer publishing it as part of the automatic release set.
            echo "targets=openclaw-base agentteams-controller embedded manager manager-copaw worker copaw-worker hermes-worker" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch: use inputs
            VERSION="${{ inputs.version }}"
            if [ -z "${VERSION}" ]; then
              VERSION="latest"
            fi
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "targets=${{ inputs.targets }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push openclaw-base
        if: ${{ steps.meta.outputs.targets == 'all' || contains(steps.meta.outputs.targets, 'openclaw-base') }}
        run: |
          make push-openclaw-base \
            VERSION=${{ steps.meta.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            HIGRESS_REGISTRY=higress-registry.us-west-1.cr.aliyuncs.com

      - name: Build and push agentteams-controller
        if: ${{ steps.meta.outputs.targets == 'all' || contains(steps.meta.outputs.targets, 'agentteams-controller') }}
        run: |
          make push-agentteams-controller \
            VERSION=${{ steps.meta.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            HIGRESS_REGISTRY=higress-registry.us-west-1.cr.aliyuncs.com \
            DOCKER_BUILD_ARGS="--build-arg APT_MIRROR= --build-arg PIP_INDEX_URL=https://pypi.org/simple/"

      - name: Build and push embedded
        if: ${{ steps.meta.outputs.targets == 'all' || contains(steps.meta.outputs.targets, 'embedded') }}
        run: |
          make push-embedded \
            VERSION=${{ steps.meta.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            HIGRESS_REGISTRY=higress-registry.us-west-1.cr.aliyuncs.com \
            DOCKER_BUILD_ARGS="--build-arg APT_MIRROR= --build-arg PIP_INDEX_URL=https://pypi.org/simple/"

      - name: Build and push manager images
        if: ${{ steps.meta.outputs.targets == 'all' || contains(steps.meta.outputs.targets, 'manager') }}
        run: |
          make push-manager push-manager-copaw \
            VERSION=${{ steps.meta.outputs.version }} \
            OPENCLAW_BASE_VERSION=${{ steps.meta.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            HIGRESS_REGISTRY=higress-registry.us-west-1.cr.aliyuncs.com \
            DOCKER_BUILD_ARGS="--build-arg APT_MIRROR= --build-arg PIP_INDEX_URL=https://pypi.org/simple/"

      - name: Build and push worker images
        if: |
          steps.meta.outputs.targets == 'all' ||
          contains(steps.meta.outputs.targets, 'worker') ||
          contains(steps.meta.outputs.targets, 'copaw-worker') ||
          contains(steps.meta.outputs.targets, 'hermes-worker') ||
          contains(steps.meta.outputs.targets, 'qwenpaw-worker')
        run: |
          TARGETS="${{ steps.meta.outputs.targets }}"
          MAKE_TARGETS=""
          if [ "${TARGETS}" = "all" ] || echo "${TARGETS}" | grep -qw worker; then MAKE_TARGETS="${MAKE_TARGETS} push-worker"; fi
          if [ "${TARGETS}" = "all" ] || echo "${TARGETS}" | grep -qw copaw-worker; then MAKE_TARGETS="${MAKE_TARGETS} push-copaw-worker"; fi
          if [ "${TARGETS}" = "all" ] || echo "${TARGETS}" | grep -qw hermes-worker; then MAKE_TARGETS="${MAKE_TARGETS} push-hermes-worker"; fi
          if [ "${TARGETS}" = "all" ] || echo "${TARGETS}" | grep -qw qwenpaw-worker; then MAKE_TARGETS="${MAKE_TARGETS} push-qwenpaw-worker"; fi
          make ${MAKE_TARGETS} \
            VERSION=${{ steps.meta.outputs.version }} \
            OPENCLAW_BASE_VERSION=${{ steps.meta.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }} \
            HIGRESS_REGISTRY=higress-registry.us-west-1.cr.aliyuncs.com \
            DOCKER_BUILD_ARGS="--build-arg APT_MIRROR= --build-arg PIP_INDEX_URL=https://pypi.org/simple/"

      - name: Summary
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TARGETS: ${{ steps.meta.outputs.targets }}
          OPENCLAW_BASE_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/openclaw-base
          MANAGER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-manager
          MANAGER_COPAW_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-manager-copaw
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-worker
          COPAW_WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-copaw-worker
          HERMES_WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-hermes-worker
          CONTROLLER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-controller
          EMBEDDED_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/agentteams-embedded
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\` | **Targets:** \`${TARGETS}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- Manager: \`${MANAGER_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Manager CoPaw: \`${MANAGER_COPAW_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Worker: \`${WORKER_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- CoPaw Worker: \`${COPAW_WORKER_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Hermes Worker: \`${HERMES_WORKER_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Controller: \`${CONTROLLER_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Embedded: \`${EMBEDDED_IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Base: \`${OPENCLAW_BASE_IMAGE}:latest\` (pre-built, not rebuilt here)" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: \`linux/amd64, linux/arm64\`" >> $GITHUB_STEP_SUMMARY
